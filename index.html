
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Proposal 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: black;
}

/* Center Content */
#content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 10;
}

h1 {
    color: white;
    font-size: 45px;
    text-shadow: 0 0 20px pink, 0 0 40px cyan;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px pink; }
    to { text-shadow: 0 0 40px cyan; }
}

button {
    padding: 15px 40px;
    font-size: 20px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(45deg, pink, cyan);
    color: white;
    cursor: pointer;
    transition: 0.4s;
}

button:hover {
    transform: scale(1.2);
}

/* Image */
#photo {
    width: 200px;
    border-radius: 20px;
    margin-top: 20px;
    display: none;
    box-shadow: 0 0 20px pink;
}

/* Hearts */
.heart {
    position: absolute;
    color: red;
    font-size: 25px;
    animation: fall linear forwards;
}

@keyframes fall {
    from { transform: translateY(-10vh); }
    to { transform: translateY(100vh); }
}

/* Fireworks */
.firework {
    position: absolute;
    width: 5px;
    height: 5px;
    background: white;
    border-radius: 50%;
    animation: explode 1s linear forwards;
}

@keyframes explode {
    to {
        transform: translate(var(--x), var(--y));
        opacity: 0;
    }
}
</style>
</head>

<body>

<div id="content">
    <h1 id="text">Tap Magic 💖</h1>
    <button onclick="startMagic()">Click Me ✨</button>
    <br>
    
    <!-- 👉 IMAGE LINK CHANGE CHEYYI -->
    <img id="photo" src="https://i.imgur.com/yourimage.jpg">
</div>

<audio id="music" src="https://www.bensound.com/bensound-music/bensound-love.mp3"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// 3D Background
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer();

renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

let geometry = new THREE.BufferGeometry();
let vertices = [];

for (let i = 0; i < 1000; i++) {
    vertices.push(
        (Math.random()-0.5)*2000,
        (Math.random()-0.5)*2000,
        (Math.random()-0.5)*2000
    );
}

geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
let material = new THREE.PointsMaterial({ color: 0xff00cc });
let points = new THREE.Points(geometry, material);

scene.add(points);
camera.position.z = 500;

function animate() {
    requestAnimationFrame(animate);
    points.rotation.x += 0.001;
    points.rotation.y += 0.001;
    renderer.render(scene, camera);
}
animate();

// MAGIC FUNCTION
function startMagic() {

    // 👉 NAME CHANGE CHEYYI
    document.getElementById("text").innerHTML =
    "Kalyan ❤️ Lohitha <br> WOW 😍 Love You Forever 💖";

    // Show photo
    document.getElementById("photo").style.display = "block";

    // Play music
    document.getElementById("music").play();

    // Hearts rain
    for(let i=0;i<50;i++){
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        heart.style.left = Math.random()*100+"vw";
        heart.style.animationDuration = (2+Math.random()*3)+"s";
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),5000);
    }

    // Fireworks
    for(let i=0;i<100;i++){
        let fw = document.createElement("div");
        fw.className = "firework";
        fw.style.left = "50%";
        fw.style.top = "50%";

        let x = (Math.random()-0.5)*300 + "px";
        let y = (Math.random()-0.5)*300 + "px";

        fw.style.setProperty('--x', x);
        fw.style.setProperty('--y', y);

        document.body.appendChild(fw);
        setTimeout(()=>fw.remove(),1000);
    }
}
</script>

</body>
</html>
